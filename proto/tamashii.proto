syntax = "proto3";

package tamashii;

service TamashiiService {
	rpc CreateTamashii (CreateTamashiiRequest) returns (CreateTamashiiResponse);
	rpc GetTamashii (GetTamashiiRequest) returns (GetTamashiiResponse);
}

message CreateTamashiiRequest {
	string name = 1;
}

message CreateTamashiiResponse {
	string id = 1;
}

message GetTamashiiRequest {
	string id = 1;
}

message GetTamashiiResponse {
	string name = 1;
}